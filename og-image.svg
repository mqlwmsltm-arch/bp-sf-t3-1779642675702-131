<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b4513"/>
      <stop offset="100%" stop-color="#a0522d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#a0522d"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="646" cy="109" r="56" fill="#a0522d" opacity="0.05"/>
    <circle cx="1016" cy="349" r="70" fill="#a0522d" opacity="0.13"/>
    <circle cx="585" cy="207" r="87" fill="#a0522d" opacity="0.10"/>
    <circle cx="1213" cy="434" r="87" fill="#a0522d" opacity="0.11"/>
    <circle cx="1144" cy="-20" r="94" fill="#a0522d" opacity="0.08"/>
    <circle cx="1122" cy="713" r="38" fill="#a0522d" opacity="0.16"/>
    <rect x="303" y="393" width="41" height="71" rx="8" fill="#8b4513" opacity="0.06" transform="rotate(4, 879, 694)"/>
    <rect x="1037" y="62" width="71" height="97" rx="8" fill="#8b4513" opacity="0.08" transform="rotate(2, 895, 135)"/>
    <rect x="362" y="576" width="76" height="79" rx="8" fill="#8b4513" opacity="0.09" transform="rotate(13, 909, 444)"/>
    <rect x="-56" y="321" width="40" height="65" rx="8" fill="#8b4513" opacity="0.14" transform="rotate(29, 223, 434)"/>
    <rect x="433" y="611" width="22" height="93" rx="8" fill="#8b4513" opacity="0.12" transform="rotate(11, 467, 640)"/>
    <rect x="305" y="549" width="60" height="46" rx="8" fill="#8b4513" opacity="0.05" transform="rotate(38, 1151, 270)"/>
    <rect x="564" y="315" width="98" height="50" rx="8" fill="#8b4513" opacity="0.07" transform="rotate(4, 689, 712)"/>
    <rect x="646" y="378" width="23" height="81" rx="8" fill="#8b4513" opacity="0.06" transform="rotate(37, -25, 323)"/>
    <polygon points="1034,493 1093,611 975,611" fill="#a0522d" opacity="0.12"/>
    <polygon points="24,656 70,748 -22,748" fill="#a0522d" opacity="0.09"/>
    <polygon points="1175,578 1221,670 1129,670" fill="#a0522d" opacity="0.07"/>
    <polygon points="1189,97 1235,189 1143,189" fill="#a0522d" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,534 C360,582 840,486 1200,534 L1200,630 L0,630Z" fill="#a0522d" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    PBN 빌더
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#daa520" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#daa520" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 PBN 빌더 — 서버 웜업
  </text>
</svg>